<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B2D4F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <!-- Halo subtil au centre -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond gradient diagonal -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Halo central doux -->
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- ═══ H letterform — blanc, bold, centré ═══ -->
  <!-- Pilier gauche -->
  <rect x="108" y="108" width="88" height="296" rx="16" fill="white"/>
  <!-- Pilier droit -->
  <rect x="316" y="108" width="88" height="296" rx="16" fill="white"/>
  <!-- Traverse centrale -->
  <rect x="108" y="214" width="296" height="84" rx="16" fill="white"/>

  <!-- ═══ Croix médicale — accent #60A5FA dans l'espace intérieur haut ═══ -->
  <!-- L'espace intérieur du H (x:196→316, y:108→214) est centré en (256, 161) -->
  <!-- Bras horizontal de la croix -->
  <rect x="222" y="150" width="68" height="22" rx="7" fill="#60A5FA"/>
  <!-- Bras vertical de la croix -->
  <rect x="245" y="127" width="22" height="68" rx="7" fill="#60A5FA"/>
</svg>
