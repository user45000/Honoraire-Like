<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calibration FDS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; }

    #toolbar {
      height: 42px; flex-shrink: 0;
      background: #1e293b; padding: 0 14px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid #334155; z-index: 10;
    }
    #toolbar h1 { font-size: 13px; font-weight: 700; color: #38bdf8; }
    #coords-live { font-size: 11px; color: #94a3b8; font-family: monospace; min-width: 150px; }
    #active-hint { font-size: 11px; color: #fbbf24; flex: 1; }
    .btn { padding: 4px 11px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-blue { background: #38bdf8; color: #0f172a; }
    .btn-blue:hover { background: #7dd3fc; }
    .btn-red { background: #7f1d1d; color: #fca5a5; font-size: 11px; }
    .btn-sm  { background: #334155; color: #e2e8f0; padding: 2px 8px; font-size: 14px; font-weight: 700; }

    #main { display: flex; flex: 1; min-height: 0; }

    #form-panel {
      flex: 1; min-width: 0; overflow: auto;
      background: #060c1a; padding: 12px;
      display: flex; justify-content: center; align-items: flex-start;
    }

    #form-wrap {
      position: relative; display: inline-block;
      line-height: 0; cursor: crosshair; user-select: none;
    }

    #form-img { display: block; height: var(--img-h, calc(100vh - 66px)); width: auto; }

    #preview-layer, #markers-layer {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }

    .fds-fill {
      position: absolute;
      font-family: 'Courier New', Courier, monospace;
      font-size: max(calc(var(--fds-scale, 1) * 8px), 5px);
      color: #00008b; font-weight: 700;
      white-space: nowrap; line-height: 1; pointer-events: none;
    }
    .fd-digit { font-size: max(calc(var(--fds-scale, 1) * 8px), 5px); letter-spacing: 0; }
    .fd-code  { font-size: max(calc(var(--fds-scale, 1) * 9px), 6px); font-weight: 900; color: #000080; }
    .fd-check { font-size: max(calc(var(--fds-scale, 1) * 12px), 8px); font-weight: 900; color: #00008b; }
    .fd-med   { font-family: Arial, sans-serif; font-size: max(calc(var(--fds-scale, 1) * 7.5px), 5px); line-height: 1.5; color: #00008b; }

    #ch, #cv { position: absolute; pointer-events: none; opacity: 0; background: rgba(251,191,36,.5); }
    #ch { left: 0; right: 0; height: 1px; }
    #cv { top: 0; bottom: 0; width: 1px; }

    #zones-panel {
      width: 290px; flex-shrink: 0;
      background: #1e293b; border-left: 1px solid #334155;
      overflow-y: auto; overflow-x: hidden;
    }
    .grp-title {
      padding: 6px 10px; font-size: 10px; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: .8px; background: #0f172a;
      position: sticky; top: 0; z-index: 5; border-bottom: 1px solid #1e293b;
    }
    .zone-row {
      padding: 5px 8px; cursor: pointer; border-bottom: 1px solid #111827;
      display: flex; flex-direction: column; gap: 2px;
    }
    .zone-row:hover { background: #233045; }
    .zone-row.active { background: #1a3a5c; border-left: 3px solid #38bdf8; padding-left: 5px; }
    .zone-name { font-size: 11px; color: #cbd5e1; }
    .zone-cur  { font-size: 9px; color: #64748b; font-family: monospace; }
    .zone-inps { display: flex; flex-wrap: wrap; gap: 3px; }
    .zi { display: flex; align-items: center; gap: 1px; }
    .zi label { font-size: 9px; color: #94a3b8; min-width: 10px; text-align: right; }
    .zi input {
      width: 50px; background: #0f172a; border: 1px solid #334155;
      color: #e2e8f0; padding: 1px 3px; font-size: 11px; border-radius: 3px;
      font-family: monospace; text-align: right;
    }
    .zi input:focus { outline: none; border-color: #38bdf8; }

    #modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 50; display: none; }
    #modal {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: #1e293b; border: 1px solid #38bdf8; border-radius: 8px;
      padding: 16px; width: 640px; max-width: 95vw; max-height: 85vh;
      overflow-y: auto; z-index: 51; display: none;
    }
    #modal h2 { font-size: 13px; color: #38bdf8; margin-bottom: 10px; }
    #export-pre {
      font-size: 11px; color: #86efac; white-space: pre; font-family: monospace;
      background: #0f172a; padding: 10px; border-radius: 4px; overflow-x: auto;
    }
    #mfoot { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
    #copy-ok { font-size: 12px; color: #86efac; display: none; }

    .backup-row {
      padding: 5px 10px; font-size: 11px; color: #94a3b8; font-family: monospace;
      cursor: pointer; border-bottom: 1px solid #111827;
    }
    .backup-row:hover { background: #233045; color: #e2e8f0; }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>&#127919; Calibration FDS</h1>
  <span id="coords-live">X:&#8212; Y:&#8212;</span>
  <span id="active-hint">&#8592; S&#233;lectionne une zone puis clique l&#8217;image</span>
  <label style="font-size:11px;color:#94a3b8;display:flex;align-items:center;gap:4px;cursor:pointer">
    <input type="checkbox" id="chk-markers" checked> rep&#232;res
  </label>
  <button class="btn btn-sm" id="btn-zoom-out" title="D&#233;zoomer (molette &#8595;)">&#8722;</button>
  <span id="zoom-label" style="font-size:11px;color:#94a3b8;min-width:36px;text-align:center">100%</span>
  <button class="btn btn-sm" id="btn-zoom-in"  title="Zoomer (molette &#8593;)">&#43;</button>
  <button class="btn btn-red" id="btn-reset">Reset</button>
  <button class="btn btn-blue" id="btn-export">Exporter JS</button>
  <button class="btn" id="btn-save" style="background:#15803d;color:#fff">Sauvegarder</button>
</div>

<div id="main">
  <div id="form-panel">
    <div id="form-wrap">
      <img id="form-img" src="/images/fds_form.png" alt="">
      <div id="preview-layer"></div>
      <div id="markers-layer"></div>
      <div id="ch"></div>
      <div id="cv"></div>
    </div>
  </div>
  <div id="zones-panel">
    <div id="backups-list" style="border-bottom:1px solid #334155"></div>
  </div>
</div>

<div id="modal-bg"></div>
<div id="modal">
  <h2>Constantes JS &#8212; coller dans app.js</h2>
  <pre id="export-pre"></pre>
  <div id="mfoot">
    <button class="btn btn-blue" id="btn-copy">Copier</button>
    <button class="btn btn-red" id="btn-close-modal">Fermer</button>
    <span id="copy-ok">&#10003; Copi&#233; !</span>
  </div>
</div>

<script src="/js/admin-fds.js"></script>
</body>
</html>
