<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 32" fill="white">
  <!-- ============================================================
       Honoraires MG — Inline Header Logo
       Height: 32px  |  Width: ~200px  |  White on transparent
       No <text> — all geometric paths and shapes

       Layout (left to right):
       [icon-mark 20×20]  gap  ["Honoraires" stroked]  gap  ["MG" bold stroked]
       ============================================================ -->

  <!-- ═══ ICON MARK — mini version of PWA icon ═══
       20×20, vertically centered at y=6 -->
  <g transform="translate(0, 6)">
    <!-- Rounded square background -->
    <rect width="20" height="20" rx="4.5" fill="#2563EB"/>
    <!-- Mini H with double crossbar + medical cross -->
    <g fill="white">
      <rect x="4" y="3.5" width="2.4" height="13" rx="0.7"/>
      <rect x="13.6" y="3.5" width="2.4" height="13" rx="0.7"/>
      <rect x="5.6" y="8.4" width="8.8" height="1.6" rx="0.5"/>
      <rect x="5.6" y="10.8" width="7.4" height="1.6" rx="0.5"/>
      <g transform="translate(12.2, 3)" opacity="0.85">
        <rect x="0.4" y="0" width="1.1" height="2.8" rx="0.3"/>
        <rect x="0" y="0.85" width="1.9" height="1.1" rx="0.3"/>
      </g>
    </g>
  </g>

  <!-- ═══ "Honoraires" — regular weight geometric letters ═══
       Stroke-based, 1.9px weight, round caps
       Cap height (H) at y=8, x-height at y=13, baseline at y=24 -->
  <g fill="none" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">

    <!-- H  (x: 26–36) -->
    <line x1="27" y1="8" x2="27" y2="24"/>
    <line x1="35" y1="8" x2="35" y2="24"/>
    <line x1="27" y1="16" x2="35" y2="16"/>

    <!-- o  (x: 38–47) -->
    <ellipse cx="42.5" cy="19" rx="4" ry="5"/>

    <!-- n  (x: 49–58) -->
    <line x1="50" y1="14" x2="50" y2="24"/>
    <path d="M50,18 C50,14 58,14 58,18 L58,24"/>

    <!-- o  (x: 60–69) -->
    <ellipse cx="64.5" cy="19" rx="4" ry="5"/>

    <!-- r  (x: 71–77) -->
    <line x1="72" y1="14" x2="72" y2="24"/>
    <path d="M72,18 C72,14.5 76.5,14 77,15.5"/>

    <!-- a  (x: 79–88) -->
    <ellipse cx="83.5" cy="19" rx="4" ry="5"/>
    <line x1="87.5" y1="14" x2="87.5" y2="24"/>

    <!-- i  (x: 90–93) -->
    <line x1="91.5" y1="14" x2="91.5" y2="24"/>
    <circle cx="91.5" cy="10" r="1.3" fill="white" stroke="none"/>

    <!-- r  (x: 95–101) -->
    <line x1="96" y1="14" x2="96" y2="24"/>
    <path d="M96,18 C96,14.5 100.5,14 101,15.5"/>

    <!-- e  (x: 103–112) -->
    <line x1="103.5" y1="19" x2="111.5" y2="19"/>
    <path d="M111.5,19 C111.5,13.5 103.5,13.5 103.5,19 C103.5,24.5 111.5,24.5 111.5,22"/>

    <!-- s  (x: 114–122) -->
    <path d="M121,15.5 C121,13 115,13 115,16 C115,19 121,19 121,22 C121,25 115,25 115,22.5"/>

  </g>

  <!-- ═══ "MG" — bold weight, heavier stroke ═══
       Stroke 2.8px for visual emphasis, same baseline -->
  <g fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">

    <!-- M  (x: 128–144) -->
    <polyline points="129,24 129,8 136.5,19 144,8 144,24"/>

    <!-- G  (x: 149–163) -->
    <path d="M162,12 C159,8 150,8 150,16 C150,24 159,24 162,20 L162,17 L157,17"/>

  </g>

  <!-- Accent underline beneath MG (sky blue brand color) -->
  <rect x="128" y="27" width="36" height="1.4" rx="0.7" fill="#60A5FA" opacity="0.75"/>

</svg>
